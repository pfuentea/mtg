services:
  - type: web
    name: ctmagic
    runtime: python
    rootDir: mtg
    buildCommand: "bash build.sh"
    startCommand: "gunicorn ctm.wsgi:application --workers 2 --threads 2 --timeout 60"
    plan: free
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: "False"
      - key: ALLOWED_HOSTS
        value: ".onrender.com"
      - key: CSRF_TRUSTED_ORIGINS
        value: "https://*.onrender.com"
      - key: DATABASE_URL
        fromDatabase:
          name: ctmagic-db
          property: connectionString
      - key: PYTHON_VERSION
        value: "3.11.0"

databases:
  - name: ctmagic-db
    plan: free
    databaseName: ctmagic
    user: ctmagic_user

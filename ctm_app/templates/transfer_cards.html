{% extends "base.html" %}

{% block titulo %}Transferir Cartas{% endblock %}

{% block contenido %}
<div class="separador"></div>
<div class="container my-4">
    <div class="row mb-3">
        <div class="col-12">
            <h2 class="garde"><i class="bi bi-arrow-left-right me-2 text-warning"></i>Transferir Cartas</h2>
            <p class="text-muted">Mueve cartas fácilmente entre tus listas de Búsqueda y Ofrezco.</p>
        </div>
    </div>

    <form method="post" action="/list/transfer" id="transferForm">
        {% csrf_token %}
        <!-- Hidden select for actually sending the data -->
        <select name="moved_items" id="moved_items" multiple class="d-none"></select>

        <div class="row align-items-center mb-3 p-3 bg-dark rounded-3 border border-secondary shadow-sm">
            <div class="col-md-5">
                <label for="source_list" class="form-label fw-bold text-warning"><i class="bi bi-box-arrow-right me-1"></i> Lista Origen</label>
                <select name="source_list" id="source_list" class="form-select bg-secondary text-light border-secondary" required>
                    <option value="">-- Selecciona Lista Origen --</option>
                    {% for lista in listas %}
                        <option value="{{ lista.id }}">[{{ lista.get_tipo_display }}] {{ lista.nombre }}</option>
                    {% endfor %}
                </select>
            </div>
            <div class="col-md-2 text-center text-muted">
                <i class="bi bi-arrow-right-circle fs-1 text-warning"></i>
            </div>
            <div class="col-md-5">
                <label for="target_list" class="form-label fw-bold text-success"><i class="bi bi-box-arrow-in-right me-1"></i> Lista Destino</label>
                <select name="target_list" id="target_list" class="form-select bg-secondary text-light border-secondary" required>
                    <option value="">-- Selecciona Lista Destino --</option>
                    {% for lista in listas %}
                        <option value="{{ lista.id }}">[{{ lista.get_tipo_display }}] {{ lista.nombre }}</option>
                    {% endfor %}
                </select>
            </div>
        </div>

        <div class="row mb-4">
            <div class="col-md-5">
                <label class="small text-muted mb-1">Cartas en la Lista Origen:</label>
                <select multiple class="form-select border-warning" id="source_items" style="height: 350px; background-color: #2b2b36; color: #fff;"></select>
            </div>
            <div class="col-md-2 d-flex flex-column justify-content-center align-items-center gap-3">
                <button type="button" class="btn btn-warning btn-shine fw-bold text-dark border-0 rounded-pill px-3 py-2" onclick="moveCardsRight()" title="Mover a Destino">
                    <i class="bi bi-chevron-right fs-4"></i>
                </button>
                <button type="button" class="btn btn-warning btn-shine fw-bold text-dark border-0 rounded-pill px-3 py-2" onclick="moveCardsLeft()" title="Devolver a Origen">
                    <i class="bi bi-chevron-left fs-4"></i>
                </button>
            </div>
            <div class="col-md-5">
                <label class="small text-muted mb-1">Cartas a Transferir al Destino:</label>
                <select multiple class="form-select border-success" id="target_items" style="height: 350px; background-color: #2b2b36; color: #fff;"></select>
            </div>
        </div>

        <div class="row">
            <div class="col-12 text-end">
                <a href="/index" class="btn btn-secondary btn-lg rounded-pill px-4 shadow me-2"><i class="bi bi-x-circle me-1"></i> Cancelar</a>
                <button type="submit" class="btn btn-success btn-lg rounded-pill px-5 shadow"><i class="bi bi-save me-2"></i> Guardar Cambios</button>
            </div>
        </div>
    </form>
</div>

<script>
    $(document).ready(function() {
        $('#source_list, #target_list').on('change', function() {
            let sourceId = $('#source_list').val();
            let targetId = $('#target_list').val();
            
            if (sourceId && targetId && sourceId === targetId) {
                toastr.error('La lista origen y destino no pueden ser la misma.');
                $(this).val('');
                return;
            }

            if ($(this).attr('id') === 'source_list' && sourceId) {
                loadSourceItems(sourceId);
            }
        });

        $('#transferForm').on('submit', function(e) {
            let targetId = $('#target_list').val();
            let targetItems = $('#target_items option');
            
            if (!targetId) {
                e.preventDefault();
                toastr.warning('Selecciona una lista destino.');
                return;
            }
            if (targetItems.length === 0) {
                e.preventDefault();
                toastr.warning('No hay cartas para transferir.');
                return;
            }

            let hiddenSelect = $('#moved_items');
            hiddenSelect.empty();
            targetItems.each(function() {
                hiddenSelect.append(new Option($(this).text(), $(this).val(), true, true));
            });
        });
    });

    function loadSourceItems(listaId) {
        let sourceSelect = $('#source_items');
        let targetSelect = $('#target_items');
        
        sourceSelect.empty().append('<option disabled>Cargando cartas...</option>');
        targetSelect.empty();
        
        $.ajax({
            url: '/list/api/items/' + listaId,
            type: 'GET',
            success: function(response) {
                sourceSelect.empty();
                if (response.items && response.items.length > 0) {
                    response.items.forEach(function(item) {
                        sourceSelect.append(new Option(item.text, item.id));
                    });
                } else {
                    sourceSelect.append('<option disabled>No hay cartas en esta lista.</option>');
                }
            },
            error: function(err) {
                sourceSelect.empty().append('<option disabled>Error al cargar cartas.</option>');
                toastr.error('Ocurrió un error cargando la lista.');
            }
        });
    }

    window.moveCardsRight = function() {
        let selected = $('#source_items option:selected');
        if (selected.length === 0) return;
        
        selected.each(function() {
            if ($(this).prop('disabled')) return;
            $(this).prop('selected', false);
            $('#target_items').append($(this));
        });
    };

    window.moveCardsLeft = function() {
        let selected = $('#target_items option:selected');
        if (selected.length === 0) return;
        
        selected.each(function() {
            $(this).prop('selected', false);
            $('#source_items').append($(this));
        });
    };
</script>
{% endblock %}

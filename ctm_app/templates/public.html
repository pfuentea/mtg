<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block titulo %}CTM.a.g.i.c.{% endblock %}</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-EVSTQN3/azprG1Anm3QDgpJLIm9Nao0Yz1ztcQTwFspd3yD65VohhpuuCOmLASjC" crossorigin="anonymous">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/toastr.js/latest/toastr.css" integrity="sha512-3pIirOrwegjM6erE5gPSwkUzO+3cTjpnV9lexlNZqvupR64iZBnOOTiiLPb9M36zpMScbmUNIcHUqKD47M719g==" crossorigin="anonymous" referrerpolicy="no-referrer" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600;700&display=swap" rel="stylesheet">

  {% load static %}
  <link rel="stylesheet" type="text/css" href='{% static "/css/style.css" %}'>
  <link rel="preload" href='{% static "/fonts/Garde.woff2" %}' as="font" type="font/woff2" crossorigin>

  <style>
    body {
      padding-top: 56px;
      padding-bottom: 80px;
    }
    /* Navbar pública */
    .public-navbar {
      background-color: #1A1A1D;
      border-bottom: 1px solid #2A2A2E;
    }
    /* Tarjeta de contenido público */
    .public-card {
      background: linear-gradient(145deg, #1e1e2e, #161623);
      border: 1px solid #2A2A2E;
      border-radius: 12px;
      padding: 2rem;
    }
    /* Formularios oscuros */
    .form-control {
      background-color: #252538;
      color: #E0E0E0;
      border: 1px solid #3a3a4e;
    }
    .form-control:focus {
      background-color: #252538;
      color: #E0E0E0;
      border-color: #F77e0d;
      box-shadow: 0 0 0 0.2rem rgba(247, 126, 13, 0.2);
    }
    .form-control::placeholder {
      color: #666;
    }
    .form-label {
      color: #C0C0C0;
      font-weight: 500;
    }
    /* Botón principal naranja */
    .btn-primary {
      background-color: #F77e0d;
      border-color: #F77e0d;
      color: #111;
      font-weight: 600;
    }
    .btn-primary:hover {
      background-color: #e06b00;
      border-color: #e06b00;
      color: #111;
      box-shadow: 0 4px 12px rgba(247, 126, 13, 0.4);
    }
    .btn-primary:focus, .btn-primary:active {
      background-color: #c75e00;
      border-color: #c75e00;
      color: #111;
    }
    /* Divisor formulario */
    .form-divider {
      border-color: #2A2A2E;
      opacity: 0.5;
    }
    /* Separador logo/formulario responsive */
    .logo-divider {
      border-bottom: 1px solid #2A2A2E;
      padding-bottom: 1rem;
    }
    @media (min-width: 768px) {
      .logo-divider {
        border-bottom: none;
        border-right: 1px solid #2A2A2E;
        padding-bottom: 0;
      }
    }
    /* Footer público */
    .public-footer {
      position: fixed;
      bottom: 0;
      left: 0;
      width: 100%;
      background-color: rgba(26, 26, 29, 0.97);
      border-top: 1px solid #F77e0d;
      z-index: 900;
      padding: 8px 0;
    }
    .public-footer a {
      color: #aaa;
      text-decoration: none;
      font-size: 0.82rem;
      transition: color 0.2s;
    }
    .public-footer a:hover {
      color: #F77e0d;
    }
  </style>
</head>

<body>

  <!-- Navbar -->
  <nav class="navbar navbar-dark public-navbar fixed-top" style="height: 56px; z-index: 1030;">
    <div class="container-fluid px-3">
      <a class="navbar-brand" href="/inicio">
        <span class="garde naranjo" style="font-size: 1.4rem;">CTM.a.g.i.c.</span>
      </a>
      <div class="d-flex gap-2 align-items-center">
        <a href="/login" class="btn btn-outline-warning btn-sm">
          <i class="bi bi-box-arrow-in-right me-1"></i>Login
        </a>
        <a href="/registro" class="btn btn-primary btn-sm btn-shine">
          <i class="bi bi-person-plus me-1"></i>Registrarse
        </a>
      </div>
    </div>
  </nav>

  {% block contenido %}
  {% endblock %}

  <!-- Footer -->
  <footer class="public-footer">
    <div class="container-fluid">
      <div class="row text-center g-0">
        <div class="col-4">
          <a href="/inicio#quees"><i class="bi bi-question-circle me-1"></i>¿Qué es <span class="garde">CTM.a.g.i.c.</span>?</a>
        </div>
        <div class="col-4">
          <a href="/inicio#como"><i class="bi bi-gear me-1"></i>¿Cómo funciona?</a>
        </div>
        <div class="col-4">
          <a href="/inicio#join"><i class="bi bi-person-check me-1"></i>¿Cómo me uno?</a>
        </div>
      </div>
    </div>
  </footer>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/js/bootstrap.bundle.min.js" integrity="sha384-MrcW6ZMFYlzcLA8Nl+NtUVF0sA7MsXsP1UyJoMp4YLEuNSfAP+JcXn/tWtIaxVXM" crossorigin="anonymous"></script>
  <script src="https://code.jquery.com/jquery-3.6.0.min.js" integrity="sha256-/xUj+3OJU5yExlq6GSYGSHk7tPXikynS7ogEvDej/m4=" crossorigin="anonymous"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/toastr.js/latest/toastr.min.js" integrity="sha512-VEd+nq25CkR676O+pLBnDW09R7VQX9Mdiij052gVCp5yVH3jGtH70Ho/UUv4mJDsEdTvqRCFZg0NKGiojGnUCw==" crossorigin="anonymous" referrerpolicy="no-referrer"></script>

  <script>
    toastr.options = {
      "closeButton": true,
      "progressBar": true,
    }
    {% if messages %}
      {% for message in messages %}
        toastr.{{ message.tags }}("{{ message }}")
      {% endfor %}
    {% endif %}
  </script>

</body>
</html>
